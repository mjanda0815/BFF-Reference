server:
  port: ${SERVER_PORT:8083}
  forward-headers-strategy: framework

spring:
  application:
    name: activity-service

# JWT decoding configuration. JWKS via the internal docker network; `iss` validated against
# the public URL that Keycloak stamps into tokens.
keycloak:
  jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/bff-demo/protocol/openid-connect/certs}
  expected-issuer: ${KEYCLOAK_EXPECTED_ISSUER:http://host.docker.internal:8080/realms/bff-demo}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO
    org.springframework.security: INFO
