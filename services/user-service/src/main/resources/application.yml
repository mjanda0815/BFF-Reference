server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework

spring:
  application:
    name: user-service

# JWT decoding configuration. The JWKS is fetched from Keycloak via the internal docker network,
# while the expected `iss` claim is the public URL that Keycloak stamps into tokens.
keycloak:
  jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/bff-demo/protocol/openid-connect/certs}
  expected-issuer: ${KEYCLOAK_EXPECTED_ISSUER:http://localhost:8080/realms/bff-demo}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
