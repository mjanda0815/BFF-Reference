# nginx configuration for the BFF reference dashboard.
#
# Responsibilities:
#   - serve the compiled Angular bundle as static assets
#   - reverse-proxy /api/**, /login, /logout, /oauth2/** to the BFF
#     (the browser must talk to the same origin so the session cookie
#      and CSRF cookie stay first-party — see docs/security-concept.md)
#   - SPA fallback: unknown routes return index.html so the Angular
#     router can take over

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;

    # gzip for typical SPA payloads
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    upstream bff_upstream {
        server bff:8090;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers — kept conservative for a reference setup.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Long cache for fingerprinted Angular assets.
        location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Never cache the entry document — it references hashed assets.
        location = /index.html {
            add_header Cache-Control "no-store, must-revalidate";
        }

        # Reverse proxy to the BFF. Same-origin from the browser's
        # point of view so SameSite=Lax cookies are sent.
        location /api/ {
            proxy_pass http://bff_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_read_timeout 30s;
        }

        location /login {
            proxy_pass http://bff_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        location /logout {
            proxy_pass http://bff_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        location /oauth2/ {
            proxy_pass http://bff_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        # SPA fallback — last because the proxied locations above must win.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
